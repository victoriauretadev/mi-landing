<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CO:DE Developer - Diseño web y tiendas online profesionales"
    />
    <title>CO:DE Developer | Diseño Web y Tiendas Online</title>
    <link rel="stylesheet" href="register.css" />
  </head>
<body>
    
    <header class="header">
      <div class="header-container">
        <div class="logo">
          <a href="index.html" aria-label="CO:DE Developer">
            <img
              src="./assets/img/logotipo/logotipo-code-horizonta-sin-fondo.png"
              alt="CO:DE Logo"
            />
          </a>
        </div>

       

        <div class="auth-buttons">
          <button class="btn btn-login"><a href="./login.html">Login</a></button>
          <!-- <button class="btn btn-register"><a href="./register.html">Register</a></button> -->
        </div>
      </div>
    </header>



    <!-- TERMINA HEADER -->

<section class="auth">
      <div class="auth__container">
        <!-- LADO IZQUIERDO -->
        <div class="auth__left">
          <h1 class="auth__title">Crea tu cuenta gratuita</h1>
          <p class="auth__subtitle">
            Explora las características principales para individuos y
            organizaciones.
          </p>

          <ul class="auth__features">
            <li class="auth__feature">
              <span>✔</span>
              Acceso a herramientas avanzadas
            </li>
            <li class="auth__feature">
              <span>✔</span>
              Repositorios ilimitados
            </li>
            <li class="auth__feature">
              <span>✔</span>
              Revisión de código integrada
            </li>
            <li class="auth__feature">
              <span>✔</span>
              Automatización CI/CD
            </li>
            <li class="auth__feature">
              <span>✔</span>
              Comunidad global
            </li>
          </ul>
        </div>

      </div>

      <!-- LADO DERECHO (FORM) -->
        <div class="auth__right">
          <div class="auth-card">
            <h2 class="auth-card__title">Crear cuenta</h2>

            <button class="auth-card__social">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-google"
                viewBox="0 0 16 16"
              >
                <path
                  d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"
                />
              </svg>
              Continuar con Google
            </button>

            <div class="auth-card__divider">o</div>

            <form class="auth-card__form">
              <input
                class="auth-card__input"
                type="email"
                placeholder="Email"
              />
              <input
                class="auth-card__input"
                type="password"
                placeholder="Contraseña"
              />
              <input
                class="auth-card__input"
                type="text"
                placeholder="Usuario"
              />

              <select class="auth-card__input">
                <option>Argentina</option>
                <option>Brasil</option>
              </select>

              <label class="auth-card__checkbox">
                <input type="checkbox" />
                Recibir novedades
              </label>

              <button class="auth-card__submit">Crear cuenta</button>
            </form>
          </div>
        </div>
      </div>
    
    </section>


</body>
</html>
