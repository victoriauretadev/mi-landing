<!DOCTYPE html>
<html lang="en">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO:DE Developer | Diseño Web y Tiendas Online</title>
    <link rel="stylesheet" href="login.css" />
  </head>
</head>
<body>
    
    <header class="header">
      <div class="header-container">
        <div class="logo">
          <a href="index.html" aria-label="CO:DE Developer">
            <img
              src="./assets/img/logotipo/logotipo-code-horizonta-sin-fondo.png"
              alt="CO:DE Logo"
            />
          </a>
        </div>

        

        <div class="auth-buttons">
          <!-- <button class="btn btn-login">Login</button> -->
          <button class="btn btn-register"><a href="./register.html">Register</a></button>
        </div>
      </div>
    </header>


    <!-- TERMINA HEADER -->


    <div class="auth__right">
          <div class="auth-card">
            <h2 class="auth-card__title">Registrate en CO:DE</h2>

            <form class="auth-card__form">
              <input
                class="auth-card__input"
                type="email"
                placeholder="Email"
              />
              <input
                class="auth-card__input"
                type="password"
                placeholder="Contraseña"
              />
              

              

              

              <button class="auth-card__submit">Iniciar Sesión</button>
            </form>
          </div>

          </div>

</body>
</html>
